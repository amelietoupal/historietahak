<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dějepis — Kartičky z poznámek</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f4f6f9; color: #1a2535; font-family: 'Source Sans 3', sans-serif; min-height: 100vh; }

header {
background: #fff; border-bottom: 1px solid #dde3ec;
padding: 16px 24px 0; position: sticky; top: 0; z-index: 100;
box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.header-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 2px; }
h1 { font-family: ‘Libre Baskerville’, serif; font-size: 1.35rem; font-weight: 700; color: #1a2535; letter-spacing: -0.02em; }
.subtitle { font-size: 0.78rem; color: #6b7e99; font-style: italic; }

.filters { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 0 12px; align-items: center; }
.filter-btn {
padding: 4px 13px; border-radius: 999px; border: 1.5px solid #dde3ec; background: transparent;
color: #6b7e99; font-size: 0.72rem; font-weight: 600; font-family: ‘Source Sans 3’, sans-serif;
cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: #8899b0; color: #1a2535; background: #fff; }
.filter-btn.active { border-color: transparent; color: #fff; font-weight: 700; }
.filter-btn[data-cat=“vse”].active        { background: #334155; }
.filter-btn[data-cat=“zahranici”].active  { background: #0891b2; }
.filter-btn[data-cat=“domaci”].active     { background: #7c3aed; }
.filter-btn[data-cat=“heydrich”].active   { background: #dc2626; }
.filter-btn[data-cat=“anthropoid”].active { background: #be123c; }
.filter-btn[data-cat=“overlord”].active   { background: #1d4ed8; }
.filter-btn[data-cat=“tehran”].active     { background: #1e40af; }
.filter-btn[data-cat=“bagration”].active  { background: #ea580c; }
.filter-btn[data-cat=“konec”].active      { background: #475569; }
.filter-btn[data-cat=“datumy”].active     { background: #d97706; }

.controls { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.ctrl-btn {
padding: 4px 12px; border-radius: 7px; border: 1.5px solid #dde3ec; background: #fff;
color: #1a2535; font-size: 0.72rem; font-weight: 600; font-family: ‘Source Sans 3’, sans-serif;
cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.ctrl-btn:hover { background: #f4f6f9; border-color: #aab4c4; }
.ctrl-btn.mode-active { background: #1e293b; color: #fff; border-color: #1e293b; }
.ctrl-btn.learn-active { background: #059669; color: #fff; border-color: #059669; }

.stats-bar {
padding: 8px 24px; font-size: 0.75rem; color: #6b7e99;
border-bottom: 1px solid #dde3ec; background: #fff;
display: flex; gap: 20px; align-items: center;
}
.stat { display: flex; align-items: center; gap: 4px; }
.stat strong { color: #1a2535; }

.progress-section {
background: #fff; border-bottom: 1px solid #dde3ec;
padding: 8px 24px 10px; display: flex; align-items: center; gap: 14px;
}
.progress-bar-wrap { flex: 1; height: 8px; background: #e8ecf2; border-radius: 999px; overflow: hidden; }
.progress-bar-fill {
height: 100%; width: 0%; background: linear-gradient(90deg, #059669, #10b981);
border-radius: 999px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.progress-label { font-size: 0.73rem; font-weight: 600; color: #6b7e99; white-space: nowrap; min-width: 110px; text-align: right; }
.progress-label.complete { color: #059669; }

.grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
gap: 14px; padding: 20px 24px 56px; max-width: 1200px; margin: 0 auto;
}
.empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #6b7e99; font-size: 1rem; }

/* ══ CARD ══ */
.card-wrap { perspective: 1200px; cursor: pointer; }
.card-inner {
position: relative; width: 100%; height: 100%;
transform-style: preserve-3d;
transition: transform 0.52s cubic-bezier(0.4,0,0.2,1);
}
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
position: absolute; inset: 0; border-radius: 12px;
display: flex; flex-direction: column; justify-content: space-between;
padding: 14px 16px 12px; overflow: hidden;
backface-visibility: hidden; -webkit-backface-visibility: hidden;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.card-front { color: #fff; transform: rotateY(0deg); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
.card-front::after {
content: ‘’; position: absolute; bottom: -24px; right: -24px;
width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.08);
pointer-events: none; backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.card-back { transform: rotateY(180deg); background: #fff; border: 2px solid transparent; color: #1a2535; }
.card-back .card-cat { color: #6b7e99; }
.card-cat  { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.75; position: relative; z-index: 1; }
.card-type { font-size: 0.59rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.5; position: relative; z-index: 1; margin-top: 1px; }
.card-q    { font-family: ‘Libre Baskerville’, serif; font-size: 0.96rem; line-height: 1.45; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; padding: 6px 2px; position: relative; z-index: 1; }
.card-hint { font-size: 0.61rem; opacity: 0.4; text-align: right; position: relative; z-index: 1; letter-spacing: 0.04em; }
.card-back .card-cat  { opacity: 1; font-size: 0.62rem; }
.card-back .card-hint { opacity: 0.3; }
.card-a { font-size: 0.9rem; font-weight: 600; line-height: 1.52; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; padding: 4px 2px; white-space: pre-line; color: #1a2535; }

.grid .card-wrap { height: 200px; }
.grid .card-wrap.known .card-front { opacity: 0.3; }

.known-btn {
position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border-radius: 50%;
border: 1.5px solid rgba(255,255,255,0.45); background: transparent;
color: rgba(255,255,255,0.55); font-size: 11px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
z-index: 10; transition: all 0.15s; line-height: 1;
}
.known-btn:hover { background: rgba(255,255,255,0.18); }
.card-wrap.known .known-btn { background: rgba(255,255,255,0.25); color: #fff; border-color: rgba(255,255,255,0.8); }

.single-card-area .card-wrap.known .card-front::before {
content: ‘✓ Zvládnuto’; position: absolute; top: 10px; left: 14px;
font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
color: #fff; background: rgba(5,150,105,0.7); padding: 2px 8px; border-radius: 999px;
z-index: 5; backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.single-card-area .card-wrap.known .card-inner {
outline: 3px solid #059669; outline-offset: 2px; border-radius: 14px;
}

/* ══ CATEGORY COLOURS ══ */
.cat-zahranici  .card-front { background: linear-gradient(135deg, #065f7a, #0891b2); }
.cat-zahranici  .card-back  { border-color: #0891b2 !important; background: #ecfafe !important; }
.cat-zahranici  .card-back .card-cat { color: #0891b2 !important; }
.cat-zahranici  .card-back .card-a   { color: #065f7a !important; }

.cat-domaci     .card-front { background: linear-gradient(135deg, #4c1d95, #7c3aed); }
.cat-domaci     .card-back  { border-color: #7c3aed !important; background: #f4f0ff !important; }
.cat-domaci     .card-back .card-cat { color: #7c3aed !important; }
.cat-domaci     .card-back .card-a   { color: #4c1d95 !important; }

.cat-heydrich   .card-front { background: linear-gradient(135deg, #7a1010, #dc2626); }
.cat-heydrich   .card-back  { border-color: #dc2626 !important; background: #fff1f1 !important; }
.cat-heydrich   .card-back .card-cat { color: #dc2626 !important; }
.cat-heydrich   .card-back .card-a   { color: #7f1d1d !important; }

.cat-anthropoid .card-front { background: linear-gradient(135deg, #6b0d25, #be123c); }
.cat-anthropoid .card-back  { border-color: #be123c !important; background: #fff0f4 !important; }
.cat-anthropoid .card-back .card-cat { color: #be123c !important; }
.cat-anthropoid .card-back .card-a   { color: #6b0d25 !important; }

.cat-overlord   .card-front { background: linear-gradient(135deg, #1e3a8a, #1d4ed8); }
.cat-overlord   .card-back  { border-color: #1d4ed8 !important; background: #eff4ff !important; }
.cat-overlord   .card-back .card-cat { color: #1d4ed8 !important; }
.cat-overlord   .card-back .card-a   { color: #1e3a8a !important; }

.cat-tehran     .card-front { background: linear-gradient(135deg, #1e3a8a, #1e40af); }
.cat-tehran     .card-back  { border-color: #1e40af !important; background: #eff6ff !important; }
.cat-tehran     .card-back .card-cat { color: #1e40af !important; }
.cat-tehran     .card-back .card-a   { color: #1e3a8a !important; }

.cat-bagration  .card-front { background: linear-gradient(135deg, #9a3412, #ea580c); }
.cat-bagration  .card-back  { border-color: #ea580c !important; background: #fff7ed !important; }
.cat-bagration  .card-back .card-cat { color: #ea580c !important; }
.cat-bagration  .card-back .card-a   { color: #7c2d12 !important; }

.cat-konec      .card-front { background: linear-gradient(135deg, #1e293b, #475569); }
.cat-konec      .card-back  { border-color: #475569 !important; background: #f1f5f9 !important; }
.cat-konec      .card-back .card-cat { color: #475569 !important; }
.cat-konec      .card-back .card-a   { color: #1e293b !important; }

.cat-datumy     .card-front { background: linear-gradient(135deg, #78350f, #d97706); }
.cat-datumy     .card-back  { border-color: #d97706 !important; background: #fffbeb !important; }
.cat-datumy     .card-back .card-cat { color: #d97706 !important; }
.cat-datumy     .card-back .card-a   { color: #78350f !important; }

/* ══ SINGLE VIEW ══ */
.single-view {
max-width: 560px; margin: 32px auto 56px;
padding: 0 24px; display: none; flex-direction: column; align-items: center; gap: 24px;
}
.single-card-area { width: 100%; position: relative; }
.single-card-area .card-wrap { width: 100%; height: 260px; }
.single-nav { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.browse-nav, .learn-nav { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
.nav-btn {
padding: 10px 24px; border-radius: 10px; border: 2px solid #dde3ec;
background: #fff; color: #1a2535; font-size: 0.85rem; font-weight: 700;
font-family: ‘Source Sans 3’, sans-serif; cursor: pointer; transition: all 0.15s; min-width: 120px;
}
.nav-btn:hover { background: #f4f6f9; border-color: #aab4c4; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-counter { font-family: ‘Libre Baskerville’, serif; font-size: 1rem; font-weight: 700; color: #1a2535; min-width: 80px; text-align: center; }
.nav-counter small { display: block; font-family: ‘Source Sans 3’, sans-serif; font-size: 0.65rem; font-weight: 400; color: #6b7e99; margin-top: 2px; }
.learn-nope {
padding: 12px 28px; border-radius: 10px; border: 2px solid #fca5a5;
background: #fff1f1; color: #7f1d1d; font-size: 0.88rem; font-weight: 700;
font-family: ‘Source Sans 3’, sans-serif; cursor: pointer; transition: all 0.15s; min-width: 130px;
}
.learn-nope:hover { background: #fee2e2; border-color: #ef4444; }
.learn-yep {
padding: 12px 28px; border-radius: 10px; border: 2px solid #6ee7b7;
background: #ecfdf5; color: #064e3b; font-size: 0.88rem; font-weight: 700;
font-family: ‘Source Sans 3’, sans-serif; cursor: pointer; transition: all 0.15s; min-width: 130px;
}
.learn-yep:hover { background: #d1fae5; border-color: #10b981; }
.flip-hint { font-size: 0.73rem; color: #6b7e99; text-align: center; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.flip-hint.visible { opacity: 1; }

/* ══ COMPLETION ══ */
.completion {
display: none; max-width: 440px; margin: 48px auto 56px;
padding: 0 24px; flex-direction: column; align-items: center; text-align: center; gap: 16px;
}
.completion-icon { font-size: 3.5rem; line-height: 1; }
.completion h2 { font-family: ‘Libre Baskerville’, serif; font-size: 1.5rem; color: #1a2535; font-weight: 700; }
.completion p { font-size: 0.95rem; color: #6b7e99; line-height: 1.6; }
.completion-stats { background: #ecfdf5; border: 2px solid #6ee7b7; border-radius: 12px; padding: 16px 24px; width: 100%; font-size: 0.9rem; color: #064e3b; font-weight: 600; }
.restart-btn {
padding: 12px 32px; border-radius: 10px; border: none; background: #059669; color: #fff;
font-size: 0.9rem; font-weight: 700; font-family: ‘Source Sans 3’, sans-serif;
cursor: pointer; transition: background 0.15s; margin-top: 4px;
}
.restart-btn:hover { background: #047857; }
</style>

</head>
<body>

<header>
  <div class="header-top">
    <h1>Kartičky — 2. světová válka</h1>
    <span class="subtitle" id="modeSubtitle">Grid — všechny kartičky najednou</span>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-cat="vse">Vše</button>
    <button class="filter-btn" data-cat="zahranici">Čs. zahraniční odboj</button>
    <button class="filter-btn" data-cat="domaci">Domácí odboj</button>
    <button class="filter-btn" data-cat="heydrich">Heydrich</button>
    <button class="filter-btn" data-cat="anthropoid">Anthropoid</button>
    <button class="filter-btn" data-cat="overlord">Overlord</button>
    <button class="filter-btn" data-cat="tehran">Teherán</button>
    <button class="filter-btn" data-cat="bagration">Bagration + Atentát</button>
    <button class="filter-btn" data-cat="konec">Konec války</button>
    <button class="filter-btn" data-cat="datumy">📅 Jen datumy</button>
    <div class="controls">
      <button class="ctrl-btn" id="viewToggleBtn">▶ Jedna po druhé</button>
      <button class="ctrl-btn" id="learnModeBtn" style="display:none">🎓 Režim učení</button>
      <button class="ctrl-btn" id="shuffleBtn">⇄ Zamíchat</button>
      <button class="ctrl-btn" id="resetBtn">↺ Reset</button>
      <button class="ctrl-btn" id="hideKnownBtn">Skrýt zvládnuté</button>
    </div>
  </div>
</header>

<div class="stats-bar">
  <span class="stat">Celkem: <strong id="countVisible">0</strong></span>
  <span class="stat">Zvládnuto ✓: <strong id="countKnown">0</strong></span>
  <span class="stat" id="statFlipped" style="display:none">Otočeno: <strong id="countFlipped">0</strong></span>
  <span class="stat" id="statRemaining" style="display:none">Zbývá v učení: <strong id="countRemaining">0</strong></span>
</div>

<div class="progress-section">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0 zvládnuto — 0 %</div>
</div>

<div class="grid" id="grid"></div>

<div class="single-view" id="singleView">
  <div class="single-card-area" id="singleCardArea"></div>
  <div class="flip-hint" id="flipHint">⟵ Nejdřív otočte kartičku, pak rozhodněte</div>
  <div class="single-nav">
    <div class="browse-nav" id="browseNav">
      <button class="nav-btn" id="prevBtn">← Předchozí</button>
      <div class="nav-counter"><span id="singleCounter">1 / 0</span><small>kartička</small></div>
      <button class="nav-btn" id="nextBtn">Další →</button>
    </div>
    <div class="learn-nav" id="learnNav" style="display:none">
      <button class="learn-nope" id="nopeBtn">✗ Neumím</button>
      <div class="nav-counter"><span id="learnCounter">0</span><small>zbývá</small></div>
      <button class="learn-yep" id="yepBtn">✓ Zvládám</button>
    </div>
  </div>
</div>

<div class="completion" id="completion">
  <div class="completion-icon">🎉</div>
  <h2>Výborně!</h2>
  <p>Zvládl/a jsi všechny kartičky v tomto setu.</p>
  <div class="completion-stats" id="completionStats"></div>
  <button class="restart-btn" id="restartBtn">↺ Zkusit znovu</button>
</div>

<script>
/* ════════════════════════════════════════════════════
   CARDS — pouze z ručních poznámek
════════════════════════════════════════════════════ */
const CARDS = [

  // ══ ČS. ZAHRANIČNÍ ODBOJ (obrázky 1 a 5) ════════════════════════
  { cat:'zahranici', type:'datum', q:'15. 3. 1939', a:'Začala okupace ČSR\n→ Němci obsazují zbytek republiky' },
  { cat:'zahranici', type:'datum', q:'16. 3. 1939', a:'Byl vyhlášen Protektorát Čechy a Morava' },

  { cat:'zahranici', type:'osoba', q:'Konstantin von Neurath', a:'1. říšský protektor protektorátu' },
  { cat:'zahranici', type:'osoba', q:'K. H. Frank', a:'Zástupce říšského protektora\n— faktická německá moc v protektorátu' },
  { cat:'zahranici', type:'osoba', q:'Emil Hácha', a:'Protektorátský prezident\n(kolaborant)' },
  { cat:'zahranici', type:'osoba', q:'Alois Eliáš', a:'Předseda protektorátní vlády' },
  { cat:'zahranici', type:'osoba', q:'Ludvík Svoboda', a:'Velitel čs. vojenských jednotek\nformovaných v Polsku' },
  { cat:'zahranici', type:'osoba', q:'Alois Vašátko & František Peřina', a:'Čs. letci — velký zájem Francie\no jejich výcvik a dovednosti' },
  { cat:'zahranici', type:'osoba', q:'Edvard Beneš', a:'V čele ČS. národního výboru v Paříži\n→ exilový prezident ve VB' },
  { cat:'zahranici', type:'osoba', q:'Monseňor Jan Šrámek', a:'Fakticky vedl jednání za ČS. výbor\n→ předseda exilové vlády ve VB' },
  { cat:'zahranici', type:'osoba', q:'M. Hodža & Š. Osuský', a:'Nesouhlasili s Benešem (Slovensko)\n→ po pádu Francie ztratili podporu, Beneš vítězí' },
  { cat:'zahranici', type:'osoba', q:'Jan Masaryk', a:'Ministr zahraničí exilové vlády\n— jednal s Brity' },
  { cat:'zahranici', type:'osoba', q:'Karel Klapálek', a:'Velitel čs. vojáků v sev. Africe\n(11. pěší prapor)' },
  { cat:'zahranici', type:'osoba', q:'Anthony Eden', a:'Vyhlásil, že Mnichovská dohoda je neplatná\n(na Benešovu žádost přes Churchilla)' },

  { cat:'zahranici', type:'pojem', q:'Proč Polsko nebylo vhodnou základnou?', a:'Nevrátilo čs. vojáky do vlastní armády\nFrancie byla ochotná — cizinecké jednotky\n→ velitel L. Svoboda' },
  { cat:'zahranici', type:'pojem', q:'Kde vznikl ČS. národní výbor?', a:'V Paříži\nV čele: E. Beneš\nJednání vedl: J. Šrámek' },
  { cat:'zahranici', type:'pojem', q:'Co se stalo po pádu Francie?', a:'Výbor se přesunul do Velké Británie\nPrezident: E. Beneš\nV čele vlády: J. Šrámek\nMinistr zahr.: J. Masaryk' },
  { cat:'zahranici', type:'pojem', q:'Hlavní cíl exilové vlády ve VB', a:'Odúznání Mnichovské dohody\n+ postavení základů pro poválečné ČS\n→ orientace a spolupráce s SSSR' },
  { cat:'zahranici', type:'pojem', q:'Jak bylo dosaženo odúznání MD?', a:'Beneš přes Churchilla žádal odúznání\n→ Anthony Eden vyhlásil, že dohoda je neplatná\nČeši získají zpět sebrané území\n(kromě Podkarpatské Rusi)' },
  { cat:'zahranici', type:'pojem', q:'Co přimělo ke konečnému odúznání MD?', a:'Vypálení Lidic 10. 6. 1942\n→ celý svět se dozvěděl\n→ obrovský mezinárodní ohlas' },
  { cat:'zahranici', type:'pojem', q:'Čs. vojáci v RAF — jak sloužili?', a:'Bombardovací perutě + stíhačky\nV sev. Africe: 11. pěší prapor (K. Klapálek)\nU D-Day: 311. peruť hlídá něm. ponorky\nStíhači: Otto Smik' },

  // ══ DOMÁCÍ ODBOJ (obrázky 1 a 2) ════════════════════════════════
  { cat:'domaci', type:'datum', q:'28. 10. 1939', a:'Protinacistická demonstrace\n→ potlačena\n→ zemřel J. Opletal a Sedláček' },

  { cat:'datumy', type:'datum', q:'12. 4. 1945', a:'Roosevelt umírá → nastupuje Truman' },
  { cat:'datumy', type:'datum', q:'16. 4. – 2. 5. 1945', a:'SSSR útočí na Berlín (Žukov + Koněv)' },
  { cat:'datumy', type:'datum', q:'30. 4. 1945', a:'Hitlerova sebevražda' },
  { cat:'datumy', type:'datum', q:'2. 5. 1945', a:'Kapitulace Berlína' },
  { cat:'datumy', type:'datum', q:'8. 5. 1945', a:'Konečná kapitulace Německa' },
  { cat:'datumy', type:'datum', q:'6. 8. 1945', a:'Bomba Little Boy na Hirošimu' },
  { cat:'datumy', type:'datum', q:'9. 8. 1945', a:'Bomba Fat Man na Nagasaki' },
  { cat:'datumy', type:'datum', q:'2. 9. 1945', a:'Kapitulace Japonska → konec 2. světové války' },
];

/* ════════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════════ */
const TYPE_LABELS = { datum:'📅 Datum', osoba:'👤 Osoba', pojem:'📖 Pojem' };
const CAT_NAMES = {
  zahranici:'Čs. zahraniční odboj', domaci:'Domácí odboj',
  heydrich:'Heydrich', anthropoid:'Anthropoid',
  overlord:'Overlord', tehran:'Teherán',
  bagration:'Bagration + Atentát', konec:'Konec války',
  datumy:'Přehled dat',
};

/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
let currentCat = 'vse', viewMode = 'grid', learnMode = false;
let displayedCards = [], knownSet = new Set(), flippedSet = new Set(), hideKnown = false;
let singleIdx = 0, singleFlipped = false, learnQueue = [], learnStartCount = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function getFiltered() { return currentCat === 'vse' ? CARDS : CARDS.filter(c => c.cat === currentCat); }

function buildCard(card) {
  const wrap = document.createElement('div');
  wrap.className = `card-wrap cat-${card.cat}`;
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <div><div class="card-cat">${CAT_NAMES[card.cat]||card.cat}</div><div class="card-type">${TYPE_LABELS[card.type]||card.type}</div></div>
        <div class="card-q">${card.q}</div>
        <div class="card-hint">klikni pro odpověď →</div>
      </div>
      <div class="card-face card-back">
        <div class="card-cat">${TYPE_LABELS[card.type]||''}</div>
        <div class="card-a">${card.a}</div>
        <div class="card-hint">klikni zpět ←</div>
      </div>
    </div>`;
  return wrap;
}

function updateProgress() {
  const total = displayedCards.length, known = knownSet.size;
  const pct = total > 0 ? Math.round(known/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  const lbl = document.getElementById('progressLabel');
  lbl.textContent = `${known} / ${total} zvládnuto — ${pct} %`;
  lbl.classList.toggle('complete', pct===100 && total>0);
  document.getElementById('countVisible').textContent = total;
  document.getElementById('countKnown').textContent = known;
}

function renderGrid(cards) {
  displayedCards = cards; knownSet.clear(); flippedSet.clear();
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  const visible = hideKnown ? cards.filter((_,i)=>!knownSet.has(i)) : cards;
  if (!visible.length) { grid.innerHTML='<div class="empty">Žádné kartičky.</div>'; updateProgress(); return; }
  visible.forEach(card => {
    const idx = cards.indexOf(card), wrap = buildCard(card);
    if (knownSet.has(idx)) wrap.classList.add('known');
    wrap.dataset.idx = idx;
    const kb = document.createElement('button'); kb.className='known-btn'; kb.title='Zvládnuto'; kb.textContent='✓';
    wrap.querySelector('.card-front').appendChild(kb);
    wrap.addEventListener('click', e => {
      if (e.target.classList.contains('known-btn')) return;
      wrap.classList.toggle('flipped');
      const i = parseInt(wrap.dataset.idx);
      wrap.classList.contains('flipped') ? flippedSet.add(i) : flippedSet.delete(i);
      document.getElementById('countFlipped').textContent = flippedSet.size;
    });
    kb.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(wrap.dataset.idx);
      knownSet.has(i) ? knownSet.delete(i) : knownSet.add(i);
      wrap.classList.toggle('known', knownSet.has(i));
      if (hideKnown && knownSet.has(i)) wrap.remove();
      updateProgress();
    });
    grid.appendChild(wrap);
  });
  updateProgress();
}

function renderSingleCard() {
  const area = document.getElementById('singleCardArea'); area.innerHTML = '';
  if (!displayedCards.length) { area.innerHTML='<p style="text-align:center;color:#6b7e99;padding:40px 0">Žádné kartičky.</p>'; return; }
  singleIdx = Math.max(0, Math.min(singleIdx, displayedCards.length-1));
  const card = displayedCards[singleIdx], wrap = buildCard(card);
  if (singleFlipped) wrap.classList.add('flipped');
  if (knownSet.has(singleIdx)) wrap.classList.add('known');
  const kb = document.createElement('button'); kb.className='known-btn'; kb.title='Zvládnuto'; kb.textContent='✓';
  wrap.querySelector('.card-front').appendChild(kb);
  kb.addEventListener('click', e => {
    e.stopPropagation();
    knownSet.has(singleIdx) ? knownSet.delete(singleIdx) : knownSet.add(singleIdx);
    wrap.classList.toggle('known', knownSet.has(singleIdx));
    updateProgress();
  });
  wrap.addEventListener('click', () => {
    singleFlipped = !singleFlipped;
    wrap.classList.toggle('flipped', singleFlipped);
    if (learnMode) {
      document.getElementById('nopeBtn').disabled = !singleFlipped;
      document.getElementById('yepBtn').disabled  = !singleFlipped;
      document.getElementById('flipHint').classList.toggle('visible', !singleFlipped);
    }
  });
  area.appendChild(wrap);
  document.getElementById('singleCounter').textContent = `${singleIdx+1} / ${displayedCards.length}`;
  document.getElementById('prevBtn').disabled = singleIdx === 0;
  document.getElementById('nextBtn').disabled = singleIdx === displayedCards.length-1;
  updateProgress();
}

function goSingle(dir) { singleIdx += dir; singleFlipped = false; renderSingleCard(); }

function startLearnMode() {
  learnQueue = shuffle(displayedCards.map((_,i)=>i).filter(i=>!knownSet.has(i)));
  learnStartCount = learnQueue.length; renderLearnCard();
}
function renderLearnCard() {
  if (!learnQueue.length) { showCompletion(); return; }
  singleFlipped = false;
  const area = document.getElementById('singleCardArea'); area.innerHTML = '';
  const wrap = buildCard(displayedCards[learnQueue[0]]);
  wrap.addEventListener('click', () => {
    singleFlipped = !singleFlipped; wrap.classList.toggle('flipped', singleFlipped);
    document.getElementById('nopeBtn').disabled = !singleFlipped;
    document.getElementById('yepBtn').disabled  = !singleFlipped;
    document.getElementById('flipHint').classList.toggle('visible', !singleFlipped);
  });
  area.appendChild(wrap);
  document.getElementById('nopeBtn').disabled = true;
  document.getElementById('yepBtn').disabled  = true;
  document.getElementById('flipHint').classList.add('visible');
  document.getElementById('learnCounter').textContent = learnQueue.length;
  updateProgress();
}
function learnNope() { learnQueue.push(learnQueue.shift()); renderLearnCard(); }
function learnYep()  { knownSet.add(learnQueue.shift()); renderLearnCard(); }
function showCompletion() {
  document.getElementById('singleView').style.display = 'none';
  document.getElementById('completion').style.display = 'flex';
  document.getElementById('completionStats').innerHTML =
    `Zvládnuto: <strong>${knownSet.size} / ${displayedCards.length}</strong> kartičky`;
  updateProgress();
}

function setViewMode(mode) {
  viewMode = mode;
  const grid=document.getElementById('grid'), sv=document.getElementById('singleView');
  const compl=document.getElementById('completion'), lb=document.getElementById('learnModeBtn');
  const vb=document.getElementById('viewToggleBtn'), sub=document.getElementById('modeSubtitle');
  compl.style.display='none';
  if (mode==='grid') {
    grid.style.display=''; sv.style.display='none'; lb.style.display='none';
    vb.textContent='▶ Jedna po druhé'; vb.classList.remove('mode-active');
    sub.textContent='Grid — všechny kartičky najednou';
    document.getElementById('statFlipped').style.display='';
    document.getElementById('statRemaining').style.display='none';
    learnMode=false; lb.classList.remove('learn-active'); lb.textContent='🎓 Režim učení';
    renderGrid(displayedCards);
  } else {
    grid.style.display='none'; sv.style.display='flex'; lb.style.display='';
    vb.textContent='☰ Zobrazit grid'; vb.classList.add('mode-active');
    sub.textContent='Jedna karta po druhé';
    document.getElementById('statFlipped').style.display='none';
    document.getElementById('statRemaining').style.display=learnMode?'':'none';
    singleIdx=0; singleFlipped=false;
    document.getElementById('browseNav').style.display=learnMode?'none':'flex';
    document.getElementById('learnNav').style.display=learnMode?'flex':'none';
    document.getElementById('flipHint').classList.remove('visible');
    learnMode ? startLearnMode() : renderSingleCard();
  }
}

function toggleLearnMode() {
  learnMode=!learnMode;
  const btn=document.getElementById('learnModeBtn');
  if (learnMode) {
    btn.classList.add('learn-active'); btn.textContent='✕ Ukončit učení';
    document.getElementById('modeSubtitle').textContent='Režim učení — Neumím / Zvládám';
    document.getElementById('statRemaining').style.display='';
    document.getElementById('browseNav').style.display='none';
    document.getElementById('learnNav').style.display='flex';
    document.getElementById('completion').style.display='none';
    document.getElementById('singleView').style.display='flex';
    startLearnMode();
  } else {
    btn.classList.remove('learn-active'); btn.textContent='🎓 Režim učení';
    document.getElementById('modeSubtitle').textContent='Jedna karta po druhé';
    document.getElementById('statRemaining').style.display='none';
    document.getElementById('browseNav').style.display='flex';
    document.getElementById('learnNav').style.display='none';
    singleIdx=0; singleFlipped=false; renderSingleCard();
  }
}

function init(cards) {
  displayedCards=cards; knownSet.clear(); flippedSet.clear(); learnMode=false;
  document.getElementById('learnModeBtn').classList.remove('learn-active');
  document.getElementById('learnModeBtn').textContent='🎓 Režim učení';
  document.getElementById('completion').style.display='none';
  viewMode==='grid' ? renderGrid(displayedCards) : (singleIdx=0, singleFlipped=false, renderSingleCard());
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentCat=btn.dataset.cat; init(getFiltered());
  });
});
document.getElementById('viewToggleBtn').addEventListener('click', () => setViewMode(viewMode==='grid'?'single':'grid'));
document.getElementById('learnModeBtn').addEventListener('click', toggleLearnMode);
document.getElementById('shuffleBtn').addEventListener('click', () => init(shuffle(getFiltered())));
document.getElementById('resetBtn').addEventListener('click', () => {
  hideKnown=false; document.getElementById('hideKnownBtn').textContent='Skrýt zvládnuté'; init(getFiltered());
});
document.getElementById('hideKnownBtn').addEventListener('click', () => {
  hideKnown=!hideKnown;
  document.getElementById('hideKnownBtn').textContent=hideKnown?'Zobrazit vše':'Skrýt zvládnuté';
  if (viewMode==='grid') renderGrid(displayedCards);
});
document.getElementById('prevBtn').addEventListener('click', () => goSingle(-1));
document.getElementById('nextBtn').addEventListener('click', () => goSingle(1));
document.getElementById('nopeBtn').addEventListener('click', learnNope);
document.getElementById('yepBtn').addEventListener('click',  learnYep);
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('completion').style.display='none';
  document.getElementById('singleView').style.display='flex';
  learnMode ? startLearnMode() : (singleIdx=0, singleFlipped=false, renderSingleCard());
});

init(getFiltered());
</script>

</body>
</html>
